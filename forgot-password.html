<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/max-logo.png">
  <title>맥스수시 · 비밀번호 재설정</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">

  <link rel="stylesheet" href="assets/css/tokens.css?v=4aa4784">
  <link rel="stylesheet" href="assets/css/base.css?v=4aa4784">
  <link rel="stylesheet" href="assets/css/buttons.css">
  <link rel="stylesheet" href="assets/css/toast.css">
  <link rel="stylesheet" href="forgot-password.css">

  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
</head>
<body>
  <div class="auth-bg" aria-hidden="true"></div>

  <main class="auth-card" role="main">
    <header class="auth-head">
      <span class="auth-brand"><i class="ph-fill ph-key"></i>맥스수시엔진</span>
      <h1 class="auth-title">비밀번호 재설정</h1>
      <p class="auth-sub">SMS 인증 후 새 비밀번호를 설정합니다.</p>
    </header>

    <!-- 진행 단계 인디케이터 -->
    <ol class="steps" aria-label="진행 단계">
      <li class="step active" data-step="1">1. 본인 확인</li>
      <li class="step" data-step="2">2. 인증번호</li>
      <li class="step" data-step="3">3. 새 비밀번호</li>
    </ol>

    <form id="resetForm" class="auth-form" autocomplete="off" novalidate>
      <!-- Step 1: 아이디 + 전화번호 -->
      <section class="step-panel" id="step1">
        <label class="field">
          <i class="ph-light ph-user"></i>
          <input type="text" id="userid" placeholder="아이디" required>
        </label>
        <div class="row-inline">
          <label class="field field-grow">
            <i class="ph-light ph-phone"></i>
            <input type="text" id="phone" placeholder="전화번호 ('-' 제외)" required inputmode="numeric">
          </label>
          <button type="button" class="auth-btn auth-btn--sm" id="btnSendCode">인증요청</button>
        </div>
      </section>

      <!-- Step 2: 인증번호 확인 -->
      <section class="step-panel" id="step2" hidden>
        <div class="row-inline">
          <label class="field field-grow">
            <i class="ph-light ph-hash"></i>
            <input type="text" id="verificationCode" placeholder="인증번호 4자리" inputmode="numeric" maxlength="4">
          </label>
          <button type="button" class="auth-btn auth-btn--sm" id="btnVerifyCode">인증확인</button>
        </div>
      </section>

      <!-- Step 3: 새 비밀번호 -->
      <section class="step-panel" id="step3" hidden>
        <label class="field">
          <i class="ph-light ph-lock-key"></i>
          <input type="password" id="newPassword" placeholder="새 비밀번호 (4자 이상)" autocomplete="new-password">
        </label>
        <label class="field">
          <i class="ph-light ph-check-circle"></i>
          <input type="password" id="newPasswordConfirm" placeholder="새 비밀번호 확인" autocomplete="new-password">
        </label>
        <p class="feedback" id="password-feedback" aria-live="polite"></p>
        <button type="button" class="auth-btn" id="btnChangePassword">
          <i class="ph-light ph-arrow-clockwise" id="btnChangePasswordIcon"></i>
          <span id="btnChangePasswordText">비밀번호 변경</span>
        </button>
      </section>

      <p id="resetMsg" class="auth-msg" aria-live="polite"></p>
    </form>

    <footer class="auth-foot">
      <a href="login.html">로그인 페이지로 돌아가기</a>
    </footer>
  </main>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
