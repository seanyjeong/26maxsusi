<body data-page="cut_manager" data-title="예상컷 관리" data-category="관리">

<div class="app-shell" id="appShell">
  <div id="sidebar-slot"></div>

  <div class="main">
    <header class="topbar">
      <div class="page-path">
        <span>관리</span>
        <span class="sep">/</span>
        <span class="current">예상컷 관리</span>
      </div>
      <div class="topbar-actions">
        <button type="button" class="btn btn-primary" id="btnSaveAll">
          <i class="ph-light ph-floppy-disk"></i><span>전체 변경사항 저장</span>
        </button>
      </div>
    </header>

    <section class="page-content">
      <div class="page-head">
        <div>
          <h1 class="page-title">대학별 예상컷 관리</h1>
          <div class="page-sub">맥스컷은 관리자만, 지점컷은 해당 지점 원장님만 수정 가능합니다.</div>
        </div>
        <div class="head-meta" id="headMeta"></div>
      </div>

      <div class="filter-row">
        <button type="button" id="btnAll" class="filter-btn active" data-filter="all">전체 학교</button>
        <button type="button" id="btnPractical" class="filter-btn" data-filter="practical">실기 전형</button>
        <div class="filter-search">
          <i class="ph-light ph-magnifying-glass"></i>
          <input type="text" id="cutSearch" placeholder="대학/학과 검색">
        </div>
      </div>

      <div class="card">
        <table class="data-table" id="cutTable">
          <thead>
            <tr>
              <th style="width: 15%;">대학명</th>
              <th style="width: 25%;">학과명</th>
              <th style="width: 20%;">전형명</th>
              <th style="width: 20%;"><span id="maxCutHead">맥스 예상컷</span></th>
              <th style="width: 20%;">지점 예상컷</th>
            </tr>
          </thead>
          <tbody id="cutTbody">
            <tr><td colspan="5" class="placeholder">로딩중...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
