<body data-page="dashboard" data-title="대시보드" data-category="홈">

<div class="app-shell" id="appShell">
  <div id="sidebar-slot"></div>

  <div class="main">
    <header class="topbar">
      <div class="page-path">
        <span>홈</span>
        <span class="sep">/</span>
        <span class="current">대시보드</span>
      </div>
      <div class="topbar-actions">
        <button type="button" class="btn btn-ghost" id="btnReload">
          <i class="ph-light ph-arrows-clockwise"></i><span>새로고침</span>
        </button>
      </div>
    </header>

    <section class="page-content">
      <div class="page-head">
        <div>
          <h1 class="page-title">대시보드</h1>
          <div class="page-sub">공지사항 · 우리 지점 실기 일정 · 합격자 발표 일정</div>
        </div>
      </div>

      <!-- 공지사항 -->
      <section class="card">
        <div class="card-head">
          <h3 class="card-title"><i class="ph-light ph-megaphone"></i> 공지사항</h3>
        </div>
        <ul class="info-list" id="notice-list">
          <li class="placeholder">공지사항을 불러오는 중입니다...</li>
        </ul>
      </section>

      <!-- 우리 지점 실기 일정 -->
      <section class="card">
        <div class="card-head">
          <h3 class="card-title"><i class="ph-light ph-calendar-check"></i> 우리 지점 실기일정 (가까운 순)</h3>
        </div>
        <ul class="info-list" id="schedule-list">
          <li class="placeholder">일정을 불러오는 중입니다...</li>
        </ul>
      </section>

      <!-- 합격자 발표 일정 -->
      <section class="card">
        <div class="card-head">
          <h3 class="card-title"><i class="ph-light ph-trophy"></i> 합격자 발표 일정 (가까운 순)</h3>
        </div>
        <ul class="info-list" id="announcement-list">
          <li class="placeholder">일정을 불러오는 중입니다...</li>
        </ul>
      </section>
    </section>
  </div>
</div>

<!-- 공지 상세 모달 -->
<div class="modal-backdrop" id="noticeDetailModal">
  <div class="modal-card">
    <div class="modal-head">
      <div class="modal-title" id="noticeDetailTitle"></div>
    </div>
    <div class="modal-body">
      <div id="noticeDetailBody" class="notice-detail"></div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-primary" id="btnCloseDetail">확인</button>
    </div>
  </div>
</div>
