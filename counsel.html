<!doctype html>
<html lang="ko" class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="assets/img/max-logo.png">
<title>개인 상담 — 맥스수시엔진</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">

<!-- 공용 자산 CSS: tokens → base → 레이아웃 → 컴포넌트 → 페이지 -->
<link rel="stylesheet" href="assets/css/tokens.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/base.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/sidebar.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/topbar.css">
<link rel="stylesheet" href="assets/css/buttons.css">
<link rel="stylesheet" href="assets/css/toast.css">
<link rel="stylesheet" href="assets/css/modal.css">
<link rel="stylesheet" href="assets/css/combobox.css">
<link rel="stylesheet" href="assets/css/competition-rate.css?v=20260714">
<link rel="stylesheet" href="counsel.css">

<!-- PDF 라이브러리 (vendor 로컬화 — 공급망 고정) -->
<script src="assets/vendor/jspdf.umd.min.js"></script>
<script src="assets/vendor/html2canvas.min.js"></script>
<script src="assets/vendor/NanumGothic-normal.js"></script>
</head>

<body data-page="counsel" data-title="개인 상담" data-category="컨설팅">

<div class="app-shell" id="appShell">
  <!-- 사이드바 (bootstrap.js 가 assets/sidebar.html 주입) -->
  <div id="sidebar-slot"></div>

  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div class="page-path">
        <span>컨설팅</span>
        <span class="sep">/</span>
        <span class="current">개인 상담</span>
      </div>
      <div class="topbar-actions">
        <div class="combobox ct-student" id="studentCombo"></div>
        <button type="button" class="btn btn-ghost" id="btnAddCollege">
          <i class="ph-light ph-plus"></i><span>대학 추가</span>
        </button>
        <button type="button" class="btn btn-ghost" id="btnSave">
          <i class="ph-light ph-floppy-disk"></i><span>저장</span>
        </button>
        <button type="button" class="btn btn-accent" id="btnPdf">
          <span>PDF로 저장</span>
          <span class="nest"><i class="ph-light ph-file-pdf"></i></span>
        </button>
      </div>
    </header>

    <section class="page-content">
      <div id="captureArea">
        <!-- page head -->
        <div class="page-head">
          <div>
            <h1 class="page-title">
              개인 상담
              <span class="year-chip" id="yearChip"></span>
            </h1>
            <div class="page-sub" id="pageSub">상담사가 학생 한 명당 여러 대학을 비교 · 저장 · PDF 배포</div>
          </div>
        </div>

        <!-- 학생 프로필 카드 (간소화: 아바타 / Phase 4 placeholder 제거) -->
        <div class="profile-strip profile-strip--solo">
          <div class="profile-card">
            <div class="profile-body">
              <div class="profile-name">
                <span id="pName">학생을 선택하세요</span>
                <span class="profile-tag" id="pTag" hidden></span>
              </div>
              <div class="profile-meta">
                <div><i class="ph-light ph-map-pin"></i><span id="pBranch">—</span></div>
                <div><i class="ph-light ph-phone"></i><span id="pPhone">—</span></div>
              </div>
            </div>
          </div>
        </div>

        <!-- workspace -->
        <div class="workspace with-panel" id="workspace">
          <!-- primary: college table -->
          <div class="table-panel" id="collegePanel">
            <div class="tp-head">
              <div class="tp-title">
                <i class="ph-light ph-table"></i>지원 대학
                <span class="tp-count" id="tpCount">0개</span>
              </div>
              <div class="tp-actions">
                <div class="tp-search">
                  <i class="ph-light ph-magnifying-glass"></i>
                  <input id="tpSearch" placeholder="대학/학과 검색">
                </div>
              </div>
            </div>
            <div class="tp-body scroll-thin">
              <form id="counselForm" autocomplete="off">
                <table id="collegeTable" class="ct">
                  <colgroup>
                    <col class="c-num">
                    <col class="c-uni">
                    <col class="c-major">
                    <col class="c-type">
                    <col class="c-grade">
                    <col class="c-naesin">
                    <col class="c-silgi">
                    <col class="c-total">
                    <col class="c-maxcut">
                    <col class="c-branchcut">
                    <col class="c-act">
                  </colgroup>
                  <thead>
                    <tr>
                      <th class="num">#</th>
                      <th>대학명</th>
                      <th>학과</th>
                      <th>전형</th>
                      <th class="c">등급</th>
                      <th class="c">내신</th>
                      <th class="c">실기</th>                      <th class="num-th">합산 · Δ</th>
                      <th class="num-th">맥스컷</th>
                      <th class="num-th">지점컷</th>
                      <th class="c"></th>
                    </tr>
                  </thead>
                  <tbody id="collegeTbody"></tbody>
                </table>
              </form>
            </div>
          </div>

          <!-- right slide panel -->
          <aside class="sidepanel" id="sidepanel">
            <div class="sp-tabs">
              <button type="button" class="sp-tab active" data-pane="memo"><i class="ph-light ph-notepad"></i>메모</button>
              <button type="button" class="sp-tab" data-pane="history"><i class="ph-light ph-clock-counter-clockwise"></i>히스토리</button>
            </div>
            <div class="sp-body scroll-thin">
              <div class="sp-pane active" data-pane="memo">
                <textarea id="counselMemo" class="memo-textarea" placeholder="상담 내용을 상세히 입력해주세요"></textarea>
                <div class="memo-hint">
                  <span id="memoHint">변경 후 저장하세요</span>
                  <span id="memoLen">0자</span>
                </div>
              </div>
              <div class="sp-pane" data-pane="history">
                <div class="history-empty">
                  <i class="ph-light ph-clock-counter-clockwise"></i>
                  <div class="empty-title">상담 히스토리</div>
                  <div class="empty-sub">이전 상담 기록은 Phase 4 백엔드 작업 후 활성화됩니다.</div>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- 우측 패널 토글 FAB -->
<button type="button" class="panel-toggle active" id="panelToggle" title="우측 패널 토글">
  <i class="ph-light ph-sidebar-simple"></i>
  <span>메모 · 히스토리</span>
</button>

<!-- 배점표 모달 (공용 modal.css 규약: .modal-backdrop > .modal-card > .modal-head/.modal-body) -->
<div class="modal-backdrop" id="scoreTableModal" role="dialog" aria-modal="true" aria-labelledby="scoreTableTitle">
  <div class="modal-card wide">
    <div class="modal-head">
      <h3 class="modal-title" id="scoreTableTitle">배점표</h3>
      <button type="button" class="modal-close" id="scoreTableClose" aria-label="닫기">
        <i class="ph-light ph-x"></i>
      </button>
    </div>
    <div class="modal-body" id="scoreTableContainer"></div>
  </div>
</div>

<!-- 로딩 오버레이 -->
<div id="loadingOverlay" class="loading-overlay" hidden>
  <div class="loading-card">
    <img src="assets/img/max-logo.png" alt="맥스수시 로딩" class="loading-logo">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">데이터 로딩중…</div>
  </div>
</div>

<!-- 공용 JS -->
<script src="assets/js/auth.js"></script>
<script src="assets/js/competition-rate.js?v=20260714"></script>
<script src="assets/js/api.js?v=20260714"></script>
<script src="assets/js/toast.js"></script>
<script src="assets/js/modal.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/combobox.js"></script>
<script src="assets/js/bootstrap.js?v=4aa4784"></script>
<script src="counsel.js"></script>
</body>
</html>
