<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/max-logo.png">
  <title>맥스수시 · 회원가입</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">

  <link rel="stylesheet" href="assets/css/tokens.css?v=4aa4784">
  <link rel="stylesheet" href="assets/css/base.css?v=4aa4784">
  <link rel="stylesheet" href="assets/css/buttons.css">
  <link rel="stylesheet" href="assets/css/toast.css">
  <link rel="stylesheet" href="register.css">

  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
</head>
<body>
  <div class="auth-bg" aria-hidden="true"></div>

  <main class="auth-card auth-card--wide" role="main">
    <header class="auth-head">
      <span class="auth-brand"><i class="ph-fill ph-user-plus"></i>맥스수시엔진</span>
      <h1 class="auth-title">회원가입</h1>
      <p class="auth-sub">관리자 승인 후 로그인 가능합니다.</p>
    </header>

    <form id="registerForm" class="auth-form" autocomplete="off" novalidate>
      <!-- 아이디 -->
      <label class="field">
        <i class="ph-light ph-user"></i>
        <input type="text" name="userid" id="userid" placeholder="아이디 (4자 이상)" required>
      </label>
      <p class="feedback" id="userid-feedback" aria-live="polite"></p>

      <!-- 비밀번호 -->
      <label class="field">
        <i class="ph-light ph-lock-key"></i>
        <input type="password" name="password" id="password" placeholder="비밀번호" required autocomplete="new-password">
      </label>
      <label class="field">
        <i class="ph-light ph-check-circle"></i>
        <input type="password" name="passwordConfirm" id="passwordConfirm" placeholder="비밀번호 확인" required autocomplete="new-password">
      </label>
      <p class="feedback" id="password-feedback" aria-live="polite"></p>

      <!-- 이름 -->
      <label class="field">
        <i class="ph-light ph-identification-badge"></i>
        <input type="text" name="name" id="name" placeholder="이름" required>
      </label>

      <!-- 직급 -->
      <label class="field field-select">
        <i class="ph-light ph-user-gear"></i>
        <select name="position" id="position" required>
          <option value="" disabled selected>직급 선택</option>
          <option value="원장">원장</option>
          <option value="부원장">부원장</option>
          <option value="팀장">팀장</option>
          <option value="강사">강사</option>
        </select>
        <i class="ph-light ph-caret-down field-caret"></i>
      </label>

      <!-- 지점명 -->
      <label class="field">
        <i class="ph-light ph-storefront"></i>
        <input type="text" name="branch" id="branch" placeholder="지점명" required>
      </label>

      <!-- 전화번호 + 인증요청 -->
      <div class="row-inline">
        <label class="field field-grow">
          <i class="ph-light ph-phone"></i>
          <input type="text" name="phone" id="phone" placeholder="전화번호 ('-' 제외)" required inputmode="numeric">
        </label>
        <button type="button" class="auth-btn auth-btn--sm" id="btnSendCode">
          <span id="btnSendCodeText">인증요청</span>
        </button>
      </div>

      <!-- 인증번호 + 확인 -->
      <div class="row-inline">
        <label class="field field-grow">
          <i class="ph-light ph-hash"></i>
          <input type="text" id="verificationCode" placeholder="인증번호 4자리" disabled inputmode="numeric" maxlength="4">
        </label>
        <button type="button" class="auth-btn auth-btn--sm" id="btnVerifyCode" disabled>확인</button>
      </div>
      <p class="feedback" id="phone-feedback" aria-live="polite"></p>

      <!-- 가입 신청 -->
      <button type="submit" class="auth-btn" id="btnRegister" disabled>
        <i class="ph-light ph-paper-plane-tilt" id="btnRegisterIcon"></i>
        <span id="btnRegisterText">가입 신청</span>
      </button>
      <p id="registerMsg" class="auth-msg" aria-live="polite"></p>
    </form>

    <footer class="auth-foot">
      <span>이미 계정이 있으신가요?</span>
      <a href="login.html">로그인</a>
    </footer>
  </main>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="register.js"></script>
</body>
</html>
