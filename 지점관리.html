<!doctype html>
<html lang="ko" class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="assets/img/max-logo.png">
<title>지점 관리 — 맥스수시엔진</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">

<link rel="stylesheet" href="assets/css/tokens.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/base.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/sidebar.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/topbar.css">
<link rel="stylesheet" href="assets/css/buttons.css">
<link rel="stylesheet" href="assets/css/toast.css">
<link rel="stylesheet" href="assets/css/modal.css">
<link rel="stylesheet" href="assets/css/combobox.css">
<link rel="stylesheet" href="지점관리.css">

<script src="assets/vendor/xlsx.full.min.js"></script>
</head>

<body data-page="branch_manager" data-title="지점 관리" data-category="설정">

<div class="app-shell" id="appShell">
  <div id="sidebar-slot"></div>

  <div class="main">
    <header class="topbar">
      <div class="page-path">
        <span>설정</span>
        <span class="sep">/</span>
        <span class="current">지점 관리</span>
      </div>
      <div class="topbar-actions"></div>
    </header>

    <section class="page-content">
      <div class="page-head">
        <div>
          <h1 class="page-title">수합 데이터 추출</h1>
          <div class="page-sub">원장/관리자 전용 · 지점별 최종 수합 데이터 엑셀 다운로드</div>
        </div>
      </div>

      <!-- 로그인 뷰 -->
      <div class="bm-card" id="loginView">
        <h2 class="bm-card-title">로그인</h2>
        <div class="bm-field">
          <label for="userid">아이디</label>
          <input type="text" id="userid" placeholder="아이디" autocomplete="username">
        </div>
        <div class="bm-field">
          <label for="password">비밀번호</label>
          <input type="password" id="password" autocomplete="current-password">
        </div>
        <button type="button" class="bm-primary-btn" id="loginBtn">
          <i class="ph-light ph-sign-in"></i><span>로그인</span>
        </button>
      </div>

      <!-- 원장 뷰 -->
      <div class="bm-card hidden" id="ownerView">
        <h2 class="bm-card-title" id="welcomeMsgOwner"></h2>
        <p class="bm-desc">본인 지점의 수합 데이터를 엑셀로 다운로드합니다.</p>
        <button type="button" class="bm-primary-btn success" id="downloadBtnOwner">
          <i class="ph-light ph-download-simple"></i><span>내 지점 데이터 다운로드</span>
        </button>
      </div>

      <!-- Admin 뷰 -->
      <div class="bm-card hidden" id="adminView">
        <h2 class="bm-card-title">Admin 데이터 추출</h2>
        <p class="bm-desc"><strong>admin</strong> 계정입니다. 엑셀로 추출할 지점을 선택하세요.</p>
        <div class="bm-field">
          <label>지점 선택</label>
          <div class="combobox" id="branchCombo"></div>
        </div>
        <button type="button" class="bm-primary-btn success" id="downloadBtnAdmin">
          <i class="ph-light ph-download-simple"></i><span>선택한 지점 데이터 다운로드</span>
        </button>
        <button type="button" class="bm-primary-btn info" id="downloadBtnAdminAll">
          <i class="ph-light ph-file-xls"></i><span>전 지점 데이터 (대학명 역순) 다운로드</span>
        </button>
      </div>

      <div class="bm-status" id="status">로그인을 진행해주세요.</div>
    </section>
  </div>
</div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/toast.js"></script>
<script src="assets/js/modal.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/combobox.js"></script>
<script src="assets/js/bootstrap.js?v=4aa4784"></script>
<script src="지점관리.js"></script>
</body>
</html>
