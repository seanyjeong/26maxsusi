<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/max-logo.png">
  <title>맥스수시 · 로그인</title>

  <!-- 공용 폰트 / 아이콘 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">

  <!-- 공용 자산 (인증 페이지 최소 셋) -->
  <link rel="stylesheet" href="assets/css/tokens.css?v=4aa4784">
  <link rel="stylesheet" href="assets/css/base.css?v=4aa4784">
  <link rel="stylesheet" href="assets/css/buttons.css">
  <link rel="stylesheet" href="assets/css/toast.css">
  <link rel="stylesheet" href="login.css">

  <script>
    // FOUC 방지: 다크 테마 복원
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
</head>
<body>
  <div class="auth-bg" aria-hidden="true"></div>

  <main class="auth-card" role="main">
    <header class="auth-head">
      <span class="auth-brand"><i class="ph-fill ph-lightning"></i>맥스수시엔진</span>
      <h1 class="auth-title">로그인</h1>
      <p class="auth-sub">원장·관리자 전용</p>
    </header>

    <form id="loginForm" class="auth-form" autocomplete="on" novalidate>
      <label class="field">
        <i class="ph-light ph-user"></i>
        <input type="text" id="userid" name="userid" placeholder="아이디" required autocomplete="username">
      </label>
      <label class="field">
        <i class="ph-light ph-lock-key"></i>
        <input type="password" id="password" name="password" placeholder="비밀번호" required autocomplete="current-password">
      </label>

      <button type="submit" id="loginBtn" class="auth-btn">
        <i class="ph-light ph-sign-in" id="loginBtnIcon"></i>
        <span id="loginBtnText">로그인</span>
      </button>

      <p id="loginMsg" class="auth-msg" aria-live="polite"></p>
    </form>

    <footer class="auth-foot">
      <span>계정이 없으신가요? <a href="register.html">회원가입</a></span>
      <span class="dot">·</span>
      <a href="forgot-password.html">비밀번호 재설정</a>
    </footer>
  </main>

  <!-- 공용 JS (인증 페이지 최소 셋) -->
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="login.js"></script>
</body>
</html>
