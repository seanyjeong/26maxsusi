<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="utils.js"></script>
    <meta charset="UTF-8">
    <title>수시 수합엔진</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
    :root {
        --primary-color: #4364f7;
        --secondary-color: #6a8eff;
        --sidebar-bg: #1e293b;
        --sidebar-text: #f8fafc;
        --content-bg: #f1f5f9;
        --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    body {
        font-family: 'Noto Sans KR', sans-serif;
        margin: 0;
        background-color: var(--content-bg);
        display: flex;
        height: 100vh;
        overflow: hidden;
        color: #1e293b;
    }

    /* --- 사이드바 스타일 --- */
    .sidebar {
        width: 240px;
        background-color: var(--sidebar-bg);
        color: var(--sidebar-text);
        display: flex;
        flex-direction: column;
        padding: 20px 0;
        position: fixed;
        height: 100%;
        left: 0;
        top: 0;
        box-shadow: var(--card-shadow);
        z-index: 100;
        transition: all 0.3s ease;
    }
    
    .sidebar-header { 
        padding: 0 20px 20px 20px; 
        text-align: center; 
        border-bottom: 1px solid rgba(255,255,255,0.1); 
        margin-bottom: 20px;
    }
    
    .sidebar-header h1 {
        font-size: 1.2rem;
        margin: 0;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .sidebar-header h1 img {
        width: 140px;
        margin-bottom: 10px;
    }
    
    #user-info { 
        padding: 20px; 
        background-color: rgba(255,255,255,0.05); 
        text-align: center; 
        margin: 0 15px 20px;
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    
    #user-info:hover {
        background-color: rgba(255,255,255,0.1);
    }
    
    #user-info #user-name { 
        font-weight: 700; 
        font-size: 1.1rem; 
        margin-bottom: 5px;
    }
    
    #user-info #user-branch { 
        font-size: 0.85rem; 
        color: var(--secondary-color);
        opacity: 0.9;
    }
    
    /* ▼▼▼▼▼ 1. 여기가 수정된 부분 (스크롤 추가) ▼▼▼▼▼ */
    .sidebar-nav {  
        list-style: none; 
        padding: 0 15px; 
        margin: 0; 
        flex-grow: 1;
        overflow-y: auto; /* 메뉴가 길어지면 세로 스크롤 자동 생성 */
    }
    
    /* 스크롤바 디자인 (선택 사항이지만, 더 예쁘게 보임) */
    .sidebar-nav::-webkit-scrollbar {
        width: 6px;
    }
    .sidebar-nav::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
    }
    .sidebar-nav::-webkit-scrollbar-thumb {
        background-color: var(--primary-color);
        border-radius: 3px;
    }
    /* ▲▲▲▲▲ 여기까지 수정된 부분 ▲▲▲▲▲ */
    
    /* ▼▼▼▼▼ 2. 여기가 수정된 부분 (간격 미세 조정) ▼▼▼▼▼ */
    .sidebar-nav li a { 
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 15px; /* 세로 간격을 12px -> 10px로 줄임 */
        color: var(--sidebar-text); 
        text-decoration: none; 
        font-size: 0.95rem; 
        transition: all 0.3s ease;
        border-radius: 6px;
        margin-bottom: 4px; /* 아래 간격을 5px -> 4px로 줄임 */
    }
    /* ▲▲▲▲▲ 여기까지 수정된 부분 ▲▲▲▲▲ */
    
    .sidebar-nav li a i {
        width: 20px;
        text-align: center;
        font-size: 0.9rem;
        opacity: 0.8;
    }
    
    .sidebar-nav li a.active,
    .sidebar-nav li a:hover { 
        background-color: var(--primary-color); 
        color: white;
        transform: translateX(3px);
    }
    
    .sidebar-nav li a.active i,
    .sidebar-nav li a:hover i {
        opacity: 1;
    }
    
    .sidebar-footer { 
        margin-bottom: 15px;
        padding: 20px; 
        text-align: center; 
        border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    #logout-btn { 
        background-color: transparent; 
        color: var(--sidebar-text); 
        border: 1px solid rgba(255,255,255,0.2); 
        width: 100%; 
        padding: 10px; 
        border-radius: 6px; 
        cursor: pointer; 
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 0.9rem;
        margin-top: 15px;
    }
    
    #logout-btn:hover { 
        background-color: var(--primary-color);
        border-color: var(--primary-color);
    }

    .copyright {
        margin-top: 0;
        font-size: 0.75rem;
        color: rgba(248, 250, 252, 0.5);
        text-align: center;
    }

    #content-frame {
        margin-left: 240px;
        width: calc(100% - 240px);
        height: 100vh;
        border: none;
        background-color: var(--content-bg);
        transition: all 0.3s ease;
    }

    @media (max-width: 600px) { /* 기준을 768px -> 600px으로 수정 */
        .sidebar {
            width: 70px;
        }
        
        .sidebar:hover {
            width: 240px;
        }

        .sidebar:not(:hover) .sidebar-header h1 span,
        .sidebar:not(:hover) .sidebar-nav li a span,
        .sidebar:not(:hover) #user-info,
        .sidebar:not(:hover) .copyright {
            display: none;
        }

        .sidebar-header h1 {
            justify-content: center;
        }

        .sidebar-header h1 img {
            width: 36px;
            margin-bottom: 0;
        }

        #content-frame {
            margin-left: 70px;
            width: calc(100% - 70px);
        }
    }
</style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
        <div style="background:#6366f1; color:white; text-align:center; padding:8px; font-size:13px;">
          <select id="year-sidebar-select" onchange="setSusiYear(this.value)" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:4px 12px; font-weight:bold; font-size:13px; border-radius:4px; cursor:pointer;">
            <option value="26">2026학년도</option>
            <option value="27">2027학년도</option>
          </select>
          <script>document.getElementById("year-sidebar-select").value=SUSI_YEAR;</script>
        </div>
            <h1>
                <img src="https://github.com/seanyjeong/26maxsusi/blob/main/%EB%A7%A5%EC%8A%A4%EB%A1%9C%EA%B3%A0.png?raw=true" alt="logo">
                <span id="susi-year-badge">20<span id="susi-year-num"></span>수시상담엔진</span>
            </h1>
        </div>
        
        <div id="user-info">
            <div id="user-name">로딩 중...</div>
            <div id="user-branch"></div>
            <button id="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>로그아웃</span>
            </button>
        </div>

        <div id="year-switcher" style="margin:0 15px 15px;padding:10px 12px;background:rgba(255,255,255,0.05);border-radius:8px;">
            <div style="font-size:11px;color:#94a3b8;margin-bottom:6px;text-align:center;">학년도 선택</div>
            <select id="year-select-sidebar"
                style="width:100%;padding:6px 8px;border-radius:6px;background:#334155;color:white;border:1px solid #475569;font-size:13px;cursor:pointer;"
                onchange="switchSusiYear(this.value)">
                <option value="26">2026학년도</option>
                <option value="27">2027학년도</option>
            </select>
        </div>
        <script>
        async function switchSusiYear(year) {
            const token = localStorage.getItem('token');
            const res = await fetch(window.SUSI_API + '/switch-year', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ year: year })
            });
            const json = await res.json();
            if (json.success) {
                localStorage.setItem('token', json.token);
                window.setSusiYear(year);
                Swal.fire({ title: '20' + year + '학년도로 전환', icon:'info', timer:1200, showConfirmButton:false })
                    .then(() => location.reload());
            } else {
                alert('연도 전환 실패: ' + (json.message || '알 수 없는 오류'));
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            var sel = document.getElementById('year-select-sidebar');
            if (sel) sel.value = window.SUSI_YEAR || '26';
        });
        </script>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html" class="active"><i class="fas fa-home"></i><span>메인 대시보드</span></a></li>
            <li><a href="student.html"><i class="fas fa-list-ol"></i><span>학생 명단관리</span></a></li>
            <li><a href="college-grade.html"><i class="fas fa-university"></i><span>대학별 내신입력</span></a></li>
             <li><a href="explore.html"><i class="fas fa-user-graduate"></i><span>대학 검색</span></a></li>
            <li><a href="counsel.html"><i class="fas fa-user-graduate"></i><span>개인별 상담</span></a></li>
            <li><a href="counsel_group.html"><i class="fas fa-users"></i><span>그룹 상담</span></a></li>
            <li><a href="final_confirm.html"><i class="fas fa-check-double"></i><span>최종 수시수합</span></a></li>
            <li><a href="branch_summary.html"><i class="fas fa-building-columns"></i><span>대학별 최종수합(실기)</span></a></li>
            <li><a href="cut_manager.html"><i class="fas fa-cut"></i><span>예상컷 관리</span></a></li>
            <li><a href="live.html"><i class="fas fa-user-graduate"></i><span>26수합결과(live)</span></a></li>
            <li id="admin-menu" style="display:none;"><a href="admin.html"><i class="fas fa-lock"></i><span>관리자페이지(승인포함)</span></a></li>
        </ul>
        
        <div class="sidebar-footer">
            <div class="copyright">
               Copyright © 2025 맥스체대입시.            </div>
        </div>
    </aside>

    <iframe id="content-frame" name="content-frame" src="dashboard.html"></iframe>

    <script>
        const SERVER = SUSI_API;;
        const token = localStorage.getItem('token');

        document.addEventListener('DOMContentLoaded', function() {
            if (!token) {
                location.href = 'login.html';
                return;
            }
            loadUserInfo();
            setupNavLinks();
        });

        async function loadUserInfo() {
            try {
                const res = await susicFetch(`${SUSI_API}/profile`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const json = await res.json();
                
                if (json.success) {
                    const user = json.user;
                    document.getElementById('user-name').textContent = `${user.name} 원장님`;
                    document.getElementById('user-branch').textContent = `[${user.branch}]`;
                    if (user.userid === 'admin') {
                        document.getElementById('admin-menu').style.display = 'block';
                    }
                } else {
                    logout();
                }
            } catch (e) {
                console.error("프로필 로딩 실패", e);
                Swal.fire('오류', '사용자 정보를 불러오는 데 실패했습니다.', 'error');
            }
        }

        function setupNavLinks() {
            const navLinks = document.querySelectorAll('.sidebar-nav a');
            const contentFrame = document.getElementById('content-frame');

            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault(); 
                    contentFrame.src = this.href;
                    navLinks.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        function logout() {
            Swal.fire({
                title: '로그아웃 하시겠습니까?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#4364f7',
                cancelButtonColor: '#64748b',
                confirmButtonText: '로그아웃',
                cancelButtonText: '취소'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('token');
                    location.href = 'login.html';
                }
            });
        }
    </script>
<script>
  // utils.js 로드 후 연도 배지 업데이트
  (function() {
    var el = document.getElementById('susi-year-num');
    if (el) el.textContent = window.SUSI_YEAR || '26';
  })();
</script>
</body>
</html>
