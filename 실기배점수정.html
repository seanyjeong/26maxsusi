<body data-page="silgi_score_edit" data-title="실기 배점표 수정" data-category="설정">

<div class="app-shell" id="appShell">
  <div id="sidebar-slot"></div>

  <div class="main">
    <header class="topbar">
      <div class="page-path">
        <span>설정</span>
        <span class="sep">/</span>
        <span class="current">실기 배점표 수정</span>
      </div>
      <div class="topbar-actions">
        <button type="button" class="btn btn-accent" id="saveButton" hidden>
          <i class="ph-light ph-floppy-disk"></i><span>변경사항 저장</span>
        </button>
      </div>
    </header>

    <section class="page-content">
      <div class="page-head">
        <div>
          <h1 class="page-title">실기 배점표 수정</h1>
          <div class="page-sub">관리자 전용 · 대학/학과/전형 선택 후 표 셀을 직접 편집</div>
        </div>
      </div>

      <div class="picker-bar">
        <label class="picker-label" for="collegeCombo">대학/학과 선택</label>
        <div class="combobox" id="collegeCombo"></div>
      </div>

      <div id="scoreTableContainer" class="score-container">
        <div class="empty-msg" id="message">대학을 선택하면 배점표가 표시됩니다.</div>
      </div>
    </section>
  </div>
</div>

<!-- 저장 확인 모달 -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal" role="dialog" aria-labelledby="confirmTitle">
    <div class="modal-head">
      <h3 class="modal-title" id="confirmTitle">배점표 저장</h3>
      <button type="button" class="icon-btn" data-action="modal-close" aria-label="닫기">
        <i class="ph-light ph-x"></i>
      </button>
    </div>
    <div class="modal-body">
      <p>정말로 배점표를 수정하시겠습니까?</p>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" data-action="modal-close">취소</button>
      <button type="button" class="btn btn-accent" id="confirmSaveBtn">저장</button>
    </div>
  </div>
</div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/toast.js"></script>
