<!doctype html>
<html lang="ko" class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="assets/img/max-logo.png">
<title>실시간 현황 — 맥스수시엔진</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">

<link rel="stylesheet" href="assets/css/tokens.css?v=20260714">
<link rel="stylesheet" href="assets/css/base.css?v=20260714">
<link rel="stylesheet" href="assets/css/sidebar.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/topbar.css">
<link rel="stylesheet" href="assets/css/buttons.css">
<link rel="stylesheet" href="assets/css/toast.css">
<link rel="stylesheet" href="assets/css/modal.css">
<link rel="stylesheet" href="assets/css/combobox.css">
<link rel="stylesheet" href="assets/css/competition-rate.css?v=20260714">
<link rel="stylesheet" href="live.css?v=20260714">

<!-- ExcelJS: 전체 수합 엑셀 다운로드 (원본 기능 보존) -->
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
</head>

<body data-page="live" data-title="실시간 현황" data-category="수합">

<div class="app-shell" id="appShell">
  <div id="sidebar-slot"></div>

  <div class="main">
    <header class="topbar">
      <div class="page-path">
        <span>수합</span>
        <span class="sep">/</span>
        <span class="current">실시간 현황</span>
      </div>
      <div class="topbar-actions">
        <button type="button" class="btn btn-ghost privacy-toggle" id="btnPrivacy"
                aria-pressed="false" aria-controls="privacyPasswordModal">
          <i class="ph-light ph-eye-slash"></i><span>개인정보 가리기</span>
        </button>
        <button type="button" class="btn btn-accent" id="btnExcel">
          <i class="ph-light ph-file-xls"></i><span>전체 수합 엑셀</span>
        </button>
      </div>
    </header>

    <section class="page-content">
      <div class="page-head">
        <div>
          <h1 class="page-title">
            실시간 현황
            <span class="year-chip" id="yearChip"></span>
          </h1>
          <div class="page-sub">전체 교육원 수합 순위 · 폴링으로 자동 갱신</div>
        </div>
      </div>

      <!-- 필터 바 -->
      <div class="filter-bar">
        <div class="filter-field">
          <label for="comboCollege">대학명</label>
          <div class="combobox" id="comboCollege"></div>
        </div>
        <div class="filter-field">
          <label for="comboMajor">학과명</label>
          <div class="combobox" id="comboMajor"></div>
        </div>
        <div class="filter-field">
          <label for="comboType">전형명</label>
          <div class="combobox" id="comboType"></div>
        </div>
        <button type="button" class="btn btn-ghost" id="btnScoreTable" hidden>
          <i class="ph-light ph-table"></i><span>배점표</span>
        </button>
        <span class="live-indicator" id="liveIndicator" hidden>
          <i class="ph-fill ph-dot"></i><span>실시간</span>
        </span>
      </div>

      <!-- 결과 -->
      <div class="result-panel">
        <div class="result-head">
          <h3 id="resultTitle">대학/학과/전형을 선택해주세요.</h3>
        </div>

        <!-- 데스크탑 테이블 -->
        <div id="desktopView" class="desktop-view scroll-thin">
          <table id="resultTable" class="rank-table">
            <thead></thead>
            <tbody id="resultTbody"></tbody>
          </table>
        </div>

        <!-- 모바일 카드 -->
        <div id="mobileView" class="mobile-view">
          <div id="studentListContainer"></div>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- 배점표 모달 -->
<div class="modal-backdrop" id="scoreTableModal" role="dialog" aria-modal="true" aria-labelledby="scoreTableTitle">
  <div class="modal-card wide">
    <div class="modal-head">
      <h3 class="modal-title" id="scoreTableTitle">배점표</h3>
      <button type="button" class="modal-close" data-action="modal-close" aria-label="닫기">
        <i class="ph-light ph-x"></i>
      </button>
    </div>
    <div class="modal-body" id="scoreTableContainer"></div>
  </div>
</div>

<!-- 개인정보 모드 비밀번호 재확인 -->
<div class="modal-backdrop" id="privacyPasswordModal" role="dialog" aria-modal="true"
     aria-labelledby="privacyPasswordTitle" aria-describedby="privacyPasswordHelp">
  <form class="modal-card narrow" id="privacyPasswordForm">
    <div class="modal-head">
      <h3 class="modal-title" id="privacyPasswordTitle">개인정보 가리기</h3>
      <button type="button" class="modal-close" data-action="modal-close" aria-label="닫기">
        <i class="ph-light ph-x"></i>
      </button>
    </div>
    <div class="modal-body">
      <p id="privacyPasswordHelp">현재 로그인한 원장님의 비밀번호를 입력해 주세요.</p>
      <label class="privacy-field" for="privacyPassword">
        <span>비밀번호</span>
        <input id="privacyPassword" type="password" autocomplete="current-password" required>
      </label>
      <div class="privacy-message" id="privacyPasswordMessage" role="status" aria-live="polite"></div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" data-action="modal-close">취소</button>
      <button type="submit" class="btn btn-primary" id="privacyPasswordSubmit">
        <i class="ph-light ph-lock-key"></i><span>확인</span>
      </button>
    </div>
  </form>
</div>

<!-- 학생 상세 모달 (모바일 카드 클릭) -->
<div class="modal-backdrop" id="studentDetailModal" role="dialog" aria-modal="true" aria-labelledby="studentDetailTitle">
  <div class="modal-card">
    <div class="modal-head">
      <h3 class="modal-title" id="studentDetailTitle">학생 상세</h3>
      <button type="button" class="modal-close" data-action="modal-close" aria-label="닫기">
        <i class="ph-light ph-x"></i>
      </button>
    </div>
    <div class="modal-body" id="studentDetailBody"></div>
  </div>
</div>

<!-- 엑셀 진행 모달 -->
<div class="modal-backdrop" id="excelProgressModal" role="dialog" aria-modal="true" aria-labelledby="excelProgressTitle">
  <div class="modal-card">
    <div class="modal-head">
      <h3 class="modal-title" id="excelProgressTitle">전체 수합 엑셀 생성중</h3>
    </div>
    <div class="modal-body">
      <div id="excelProgressText" class="excel-progress-text">준비 중...</div>
      <div class="excel-progress-track">
        <div id="excelProgressBar" class="excel-progress-bar"></div>
      </div>
    </div>
  </div>
</div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/competition-rate.js?v=20260714"></script>
<script src="assets/js/api.js?v=20260714"></script>
<script src="assets/js/toast.js"></script>
<script src="assets/js/modal.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/combobox.js"></script>
<script src="assets/js/bootstrap.js?v=4aa4784"></script>
<script src="live-privacy.js"></script>
<script src="live-excel.js"></script>
<script src="live-page.js?v=competition20260714"></script>
</body>
</html>
