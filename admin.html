  <div class="main">
    <header class="topbar">
      <div class="page-path">
        <span>관리자</span>
        <span class="sep">/</span>
        <span class="current">원장회원 관리</span>
      </div>
      <div class="topbar-actions">
        <button type="button" class="btn btn-ghost" id="btnReload">
          <i class="ph-light ph-arrows-clockwise"></i><span>새로고침</span>
        </button>
      </div>
    </header>

    <section class="page-content">
      <div class="page-head">
        <div>
          <h1 class="page-title">원장회원 승인 / 관리</h1>
          <div class="page-sub">가입 대기 원장 승인 · 기존 원장 삭제</div>
        </div>
        <div class="head-meta" id="headMeta"></div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="data-table" id="memberTable">
            <thead>
              <tr>
                <th>아이디</th>
                <th>이름</th>
                <th>지점명</th>
                <th>전화번호</th>
                <th>승인여부</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="6" class="placeholder">로딩중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- 확인 모달 (승인/삭제 공용) -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal-card" style="max-width: 420px;">
    <div class="modal-head">
      <div class="modal-title" id="confirmTitle">확인</div>
    </div>
    <div class="modal-body">
      <p id="confirmMsg" style="margin:0; color:var(--text-2); font-size:13.5px; line-height:1.55;"></p>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="confirmCancel">취소</button>
      <button type="button" class="btn btn-primary" id="confirmOk">확인</button>
    </div>
  </div>
</div>
