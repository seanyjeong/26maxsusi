<!doctype html>
<html lang="ko" class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="assets/img/max-logo.png">
<title>최종 수합 관리 — 맥스수시엔진</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">

<!-- 공용 자산 CSS: tokens → base → 레이아웃 → 컴포넌트 → 페이지 -->
<link rel="stylesheet" href="assets/css/tokens.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/base.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/sidebar.css?v=4aa4784">
<link rel="stylesheet" href="assets/css/topbar.css">
<link rel="stylesheet" href="assets/css/buttons.css">
<link rel="stylesheet" href="assets/css/toast.css">
<link rel="stylesheet" href="assets/css/modal.css">
<link rel="stylesheet" href="assets/css/combobox.css">
<link rel="stylesheet" href="final_confirm.css">
</head>

<body data-page="final_confirm" data-title="최종 수합 관리" data-category="수합">

<div class="app-shell" id="appShell">
  <!-- 사이드바 (bootstrap.js 가 assets/sidebar.html 주입) -->
  <div id="sidebar-slot"></div>

  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div class="page-path">
        <span>수합</span>
        <span class="sep">/</span>
        <span class="current">최종 수합 관리</span>
      </div>
      <div class="topbar-actions">
        <button type="button" class="btn btn-ghost" id="btnImport">
          <i class="ph-light ph-download-simple"></i><span>상담학생 불러오기</span>
        </button>
        <button type="button" class="btn btn-ghost" id="btnAddDirect">
          <i class="ph-light ph-user-plus"></i><span>학생 직접 추가</span>
        </button>
        <button type="button" class="btn btn-accent" id="btnSaveAll">
          <i class="ph-light ph-floppy-disk"></i><span>전체 저장</span>
        </button>
      </div>
    </header>

    <section class="page-content">
      <div class="page-head">
        <div>
          <h1 class="page-title" id="mainTitle">교육원 최종 수합 관리</h1>
          <div class="page-sub">지점별 전형 최종 수합 · 상담학생 일괄 불러오기 · 실기일정 · 내신 입력</div>
        </div>
        <div class="head-meta" id="headMeta"></div>
      </div>

      <!-- 필터 카드 -->
      <div class="fc-toolbar">
        <div class="fc-filter-wrap">
          <div class="fc-field">
            <label for="selCollege">대학명</label>
            <div class="combobox" id="collegeCombo"></div>
          </div>
          <div class="fc-field">
            <label for="selMajor">학과명</label>
            <div class="combobox" id="majorCombo"></div>
          </div>
          <div class="fc-field">
            <label for="selType">전형명</label>
            <div class="combobox" id="typeCombo"></div>
          </div>
        </div>
      </div>

      <!-- 결과 카드 -->
      <div class="card">
        <div class="fc-result-head">
          <h3 class="fc-result-title" id="resultTitle">조회할 대학/학과/전형을 선택해주세요.</h3>
          <div class="fc-cut-display" id="cutScoresDisplay"></div>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="resultTable">
            <thead id="resultThead"></thead>
            <tbody id="resultTbody">
              <tr><td colspan="9" class="placeholder">조회할 대학/학과/전형을 선택해주세요.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- 확인 모달 (학생 삭제 / 빈 저장 확인) -->
<div class="modal-backdrop" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
  <div class="modal-card" style="max-width: 440px;">
    <div class="modal-head">
      <div class="modal-title" id="confirmTitle">확인</div>
      <button type="button" class="modal-close" id="confirmCloseX" aria-label="닫기">
        <i class="ph-light ph-x"></i>
      </button>
    </div>
    <div class="modal-body">
      <p class="fc-confirm-msg" id="confirmMsg">내용</p>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="confirmCancel">취소</button>
      <button type="button" class="btn btn-primary" id="confirmOk">확인</button>
    </div>
  </div>
</div>

<!-- 학생 다중 선택 모달 (상담학생 불러오기 / 직접 추가 공용) -->
<div class="modal-backdrop" id="pickModal" role="dialog" aria-modal="true" aria-labelledby="pickTitle">
  <div class="modal-card" style="max-width: 520px;">
    <div class="modal-head">
      <div class="modal-title" id="pickTitle">학생 선택</div>
      <button type="button" class="modal-close" id="pickCloseX" aria-label="닫기">
        <i class="ph-light ph-x"></i>
      </button>
    </div>
    <div class="modal-body">
      <p class="fc-pick-hint">여러 명을 체크하여 한 번에 추가할 수 있습니다.</p>
      <div class="fc-pick-search">
        <i class="ph-light ph-magnifying-glass"></i>
        <input type="text" id="pickSearch" placeholder="이름으로 검색">
      </div>
      <div class="fc-pick-list" id="pickList"></div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-ghost" id="pickCancel">취소</button>
      <button type="button" class="btn btn-primary" id="pickOk">추가</button>
    </div>
  </div>
</div>

<!-- 로딩 오버레이 -->
<div id="loadingOverlay" class="loading-overlay" hidden>
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">데이터 로딩중…</div>
  </div>
</div>

<!-- 공용 JS -->
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/toast.js"></script>
<script src="assets/js/modal.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/combobox.js"></script>
<script src="assets/js/bootstrap.js?v=4aa4784"></script>
<script src="final_confirm.js"></script>
</body>
</html>
